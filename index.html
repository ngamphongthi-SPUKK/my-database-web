<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Live Database Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 1. แก้ไข Link SDK ของ Supabase ให้ถูกต้อง -->
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">ส่งข้อความเข้า Database</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ..." 
                class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendData()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">ส่ง</button>
        </div>

        <h2 class="font-semibold text-slate-600 mb-2">ข้อความทั้งหมด:</h2>
        <ul id="list" class="space-y-2">
            <!-- ข้อมูลจะแสดงที่นี่ -->
        </ul>
    </div>

    <script>
    const SUPABASE_URL = 'https://lwdovklhnognkgmyvnpf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZG92a2xobm9nbmtnbXl2bnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODc0MDUsImV4cCI6MjA4ODY2MzQwNX0.o5LR33uwWPHrcyFYwJMZT6mxakVk-MZ3KuZxpZ5QuM4'; // คีย์ของคุณ

    // 1. เปลี่ยนชื่อตัวแปรตรงนี้ (ห้ามใช้ชื่อ supabase เฉยๆ)
    const supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    async function fetchData() {
        // 2. เปลี่ยนมาใช้ชื่อ supabaseClient
        const { data, error } = await supabaseClient.from('messages').select('*').order('id', { ascending: false });
        
        if (error) { console.error('ดึงข้อมูลพลาด:', error); return; }

        const listElement = document.getElementById('list');
        listElement.innerHTML = data.map(item => 
            `<li class="bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm text-slate-700">${item.content}</li>`
        ).join('');
    }

    async function sendData() {
        const input = document.getElementById('msgInput');
        if (!input.value) return;
        
        // 3. เปลี่ยนมาใช้ชื่อ supabaseClient ตรงนี้ด้วย
        const { error } = await supabaseClient.from('messages').insert([{ content: input.value }]);
        
        if (error) {
            console.error('ส่งข้อมูลพลาด:', error);
            alert("ส่งไม่สำเร็จ! เช็คว่าปิด RLS ใน Supabase หรือยัง?");
        } else {
            input.value = ''; 
            fetchData(); 
        }
    }

    fetchData();
</script>

</body>
</html>
