<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Live Database Page</title>
    <!-- 1. ดึง Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- 2. ดึง Supabase SDK (แก้ไขลิงก์ให้ถูกต้องสมบูรณ์) -->
    <script src="https://cdn.jsdelivr.net"></script>
</head>
<body class="bg-slate-100 min-h-screen p-8">

    <div class="max-w-md mx-auto bg-white rounded-xl shadow-md overflow-hidden p-6">
        <h1 class="text-2xl font-bold text-slate-800 mb-4">ส่งข้อความเข้า Database</h1>
        
        <div class="flex gap-2 mb-6">
            <input type="text" id="msgInput" placeholder="พิมพ์ข้อความ..." 
                class="flex-1 border rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-blue-500">
            <button onclick="sendData()" 
                class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg transition">ส่ง</button>
        </div>

        <h2 class="font-semibold text-slate-600 mb-2">ข้อความทั้งหมด:</h2>
        <ul id="list" class="space-y-2">
            <!-- ข้อมูลจะแสดงที่นี่ -->
        </ul>
    </div>

    <script>
    // 1. ประกาศค่าคงที่
    const SUPABASE_URL = 'https://lwdovklhnognkgmyvnpf.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx3ZG92a2xobm9nbmtnbXl2bnBmIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMwODc0MDUsImV4cCI6MjA4ODY2MzQwNX0.o5LR33uwWPHrcyFYwJMZT6mxakVk-MZ3KuZxpZ5QuM4';

    // 2. สร้าง Client และเก็บไว้ใน window เพื่อให้เรียกใช้ได้จากทุกที่
    window.supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    // ฟังก์ชันดึงข้อมูล
    async function fetchData() {
        const { data, error } = await window.supabaseClient.from('messages').select('*').order('id', { ascending: false });
        if (error) return console.error(error);

        const listElement = document.getElementById('list');
        listElement.innerHTML = (data || []).map(item => 
            `<li class="bg-slate-50 p-3 rounded-lg border border-slate-200 shadow-sm text-slate-700">${item.content}</li>`
        ).join('');
    }

    // ฟังก์ชันส่งข้อมูล
    async function sendData() {
        const input = document.getElementById('msgInput');
        if (!input.value) return;
        
        // ใช้ window.supabaseClient แทน client เฉยๆ
        const { error } = await window.supabaseClient.from('messages').insert([{ content: input.value }]);
        
        if (error) {
            alert("ส่งไม่สำเร็จ: " + error.message);
        } else {
            input.value = ''; 
            fetchData(); 
        }
    }

    // เรียกทำงานครั้งแรก
    fetchData();
</script>

</body>
</html>
